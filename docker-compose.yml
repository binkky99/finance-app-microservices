services:
  frontend:
    container_name: frontend
    build:
      context: ./services/finance-app-frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped

  transactions-service:
    container_name: transactions-service
    build:
      context: ./services/finance-app-transactions
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: transactions-db
      POSTGRES_PORT: 5432
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
    depends_on:
      - transactions-db

  transactions-db:
    image: postgres:latest
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: financial-data
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - transactions_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -P ${POSTGRES_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
 
volumes:
  transactions_data: